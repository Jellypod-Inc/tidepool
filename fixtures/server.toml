# Peer identity lives at $TIDEPOOL_HOME/identity.{crt,key}, generated by
# `tidepool init`. Agents declared below are tenant routes on this peer —
# they share the peer's wire identity. Use `tidepool register <name>` to
# add a tenant agent; it only edits this file.

[server]
port = 9900
host = "0.0.0.0"
localPort = 9901
rateLimit = "100/hour"

[agents.rust-expert]
rateLimit = "50/hour"
description = "Expert in Rust and systems programming"
timeoutSeconds = 30

[agents.code-reviewer]
rateLimit = "30/hour"
description = "Code review and best practices"
timeoutSeconds = 60

[connectionRequests]
mode = "deny"

[discovery]
providers = ["static"]
cacheTtlSeconds = 300
