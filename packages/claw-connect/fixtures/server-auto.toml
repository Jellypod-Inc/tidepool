# Peer identity lives at $CLAW_CONNECT_HOME/identity.{crt,key}, generated by
# `claw-connect init`. Agents declared below are tenant routes on this peer —
# they share the peer's wire identity. Use `claw-connect register <name>` to
# add a tenant agent; it only edits this file.

[server]
port = 9900
host = "0.0.0.0"
localPort = 9901
rateLimit = "100/hour"

[agents.rust-expert]
localEndpoint = "http://localhost:18800"
rateLimit = "50/hour"
description = "Expert in Rust and systems programming"

[connectionRequests]
mode = "auto"

[connectionRequests.auto]
provider = "anthropic"
model = "your-model-id"
apiKeyEnv = "YOUR_PROVIDER_API_KEY"
policy = "Accept connections from agents who have a clear reason."

[discovery]
providers = ["static"]
cacheTtlSeconds = 300
